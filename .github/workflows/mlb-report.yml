name: MLB Daily Report

# Sends the daily MLB pre-game report to Telegram, three times a day, WITHOUT
# needing the home PC on. Runs on GitHub's servers.
#
# Times are Taipei (UTC+8); cron here is UTC:
#   Taipei 00:10 = UTC 16:10 (previous day)
#   Taipei 08:30 = UTC 00:30
#   Taipei 17:00 = UTC 09:00
# Note: GitHub-scheduled crons can be delayed 5-15 min (GitHub does not
# guarantee on-time execution). Good enough for a pre-game digest.

on:
  schedule:
    - cron: "10 16 * * *"   # 00:10 Taipei
    - cron: "30 0 * * *"    # 08:30 Taipei
    - cron: "0 9 * * *"     # 17:00 Taipei
  workflow_dispatch: {}      # allow manual "Run workflow" button / gh run

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Send MLB report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: npx tsx src/mlb-report.ts
